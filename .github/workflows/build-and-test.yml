name: Build Auto-Install ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build Auto-Install ISO
        run: |
          nix build .#nixosConfigurations.iso-autoinstall.config.system.build.isoImage --print-build-logs
          ls -lh result/iso/
          cp result/iso/*.iso nixos-iris.iso

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: IRIS Auto-Installer
          files: nixos-iris.iso
          make_latest: true
          body: |
            Auto-generated IRIS NixOS installer ISO.

            Download and flash to USB:
            ```
            sudo dd if=nixos-iris.iso of=/dev/rdiskX bs=4m status=progress
            ```
