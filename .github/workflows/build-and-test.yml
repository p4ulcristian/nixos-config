name: Build IRIS Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download netboot.xyz ISO
        run: |
          # netboot.xyz is ~2MB and can boot any OS
          wget -q https://boot.netboot.xyz/ipxe/netboot.xyz.iso -O netboot.iso
          ls -lh netboot.iso

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: IRIS Installer
          files: |
            netboot.iso
            ubuntu/user-data
            ubuntu/first-boot.sh
          make_latest: true
          body: |
            # IRIS Ubuntu Installer

            ## Quick Install (netboot - requires internet)

            1. Flash `netboot.iso` to USB (~2MB)
            2. Boot from USB
            3. Select: Linux Network Installs → Ubuntu → 26.04
            4. Once installed, run:
            ```bash
            curl -L https://raw.githubusercontent.com/p4ulcristian/nixos-config/main/ubuntu/install.sh | bash
            ```

            ## What gets installed
            - Ubuntu Server 26.04
            - Nix package manager
            - home-manager with IRIS config
            - claude, gh, railway, cloudflared
            - zsh + oh-my-zsh
            - SSH keys pre-configured
