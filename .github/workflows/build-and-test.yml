name: Build Auto-Install ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build Auto-Install ISO
        run: |
          nix build .#nixosConfigurations.iso-autoinstall.config.system.build.isoImage --print-build-logs
          ls -lh result/iso/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nixos-autoinstall-iso
          path: result/iso/*.iso
          retention-days: 30
