interface=en0
bind-interfaces
dhcp-leasefile=/Users/paul/pxe/dnsmasq.leases
dhcp-range=192.168.1.0,proxy
enable-tftp
tftp-root=/Users/paul/pxe/tftp

# Match HTTP Boot clients (Arch:00016)
dhcp-match=set:efi-http,60,HTTPClient

# Match regular UEFI PXE clients (Arch:00007)
dhcp-match=set:efi-pxe,60,PXEClient:Arch:00007

# Match iPXE
dhcp-userclass=set:ipxe,iPXE

# HTTP Boot - send boot URL via option 67
dhcp-option-force=tag:efi-http,67,http://192.168.1.107:8080/grubx64.efi

# Regular UEFI PXE - serve netboot.efi via TFTP
dhcp-boot=tag:efi-pxe,netboot.efi

# iPXE chainload to our script
dhcp-boot=tag:ipxe,http://192.168.1.107:8080/autoexec.ipxe

# PXE menu for UEFI
pxe-service=x86-64_EFI,"IRIS Ubuntu",netboot.efi

log-queries
log-dhcp
